apiVersion: v1
kind: Service
metadata:
  name: kubecommander
  namespace: kubedial
  labels:
    app: kubecommander
spec:
  type: ClusterIP
  ports:
    - port: 8443
      targetPort: https
      protocol: TCP
      name: https
  selector:
    app: kubecommander
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubecommander-config
  namespace: kubedial
data:
  LOG_LEVEL: "info"
