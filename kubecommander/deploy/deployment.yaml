apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecommander
  namespace: kubedial
  labels:
    app: kubecommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecommander
  template:
    metadata:
      labels:
        app: kubecommander
    spec:
      serviceAccountName: kubecommander
      containers:
        - name: kubecommander
          image: ghcr.io/gigiozzz/kubecommander:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: kubecommander-config
                  key: LOG_LEVEL
                  optional: true
            - name: SERVER_PORT
              value: "8080"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /api/v1/agents
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/agents
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
