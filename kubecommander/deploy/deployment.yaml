apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecommander
  namespace: kubedial
  labels:
    app: kubecommander
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecommander
  template:
    metadata:
      labels:
        app: kubecommander
    spec:
      serviceAccountName: kubecommander
      containers:
        - name: kubecommander
          image: ghcr.io/gigiozzz/kubecommander:latest
          ports:
            - containerPort: 8443
              name: https
          env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: kubecommander-config
                  key: LOG_LEVEL
                  optional: true
            - name: SERVER_PORT
              value: "8443"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TLS_ENABLED
              value: "true"
            - name: TLS_CERT_FILE
              value: /etc/kubedial/tls/server.crt
            - name: TLS_KEY_FILE
              value: /etc/kubedial/tls/server.key
            - name: TLS_CA_FILE
              value: /etc/kubedial/tls/ca.crt
          volumeMounts:
            - name: tls
              mountPath: /etc/kubedial/tls
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: https
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tls
          secret:
            secretName: kubecommander-tls
