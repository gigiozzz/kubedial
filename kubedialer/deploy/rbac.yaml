apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubedialer
  namespace: kubedial
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubedialer
rules:
  # Full access to apply/delete any resource
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubedialer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubedialer
subjects:
  - kind: ServiceAccount
    name: kubedialer
    namespace: kubedial
